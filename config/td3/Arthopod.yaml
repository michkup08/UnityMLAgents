behaviors:
  Arthopod:
    trainer_type: td3
    hyperparameters:
      learning_rate: 0.0003
      learning_rate_schedule: constant
      batch_size: 256
      buffer_size: 500000
      buffer_init_steps: 50000
      tau: 0.005
      steps_per_update: 20.0
      save_replay_buffer: false
      # init_entcoef: 1.0
      reward_signal_steps_per_update: 20.0
      policy_noise: 0.1    # Siła szumu dodawanego do akcji w trakcie nauki Krytyka
      noise_clip: 0.2      # Granica obcięcia szumu
      policy_delay: 2      # Opóźnienie: Aktor uczy się 2 razy rzadziej niż Krytycy
    network_settings:
      normalize: true
      hidden_units: 512
      num_layers: 3
      vis_encode_type: simple
      deterministic: true
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 5000000
    time_horizon: 1000
    summary_freq: 30000
